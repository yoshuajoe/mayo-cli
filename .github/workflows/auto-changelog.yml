name: Auto Changelog Update

on:
  push:
    branches: [ main ]
    # Also run on tags
    tags: [ 'v*' ]

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    # Prevent infinite loop if CI commits back
    if: "!contains(github.event.head_commit.message, 'chore: changelog update')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Full history is needed to find tags/commits

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Generate AI Changelog
        env:
          MAYO_AI_PROVIDER: ${{ secrets.MAYO_AI_PROVIDER }}
          MAYO_AI_KEY: ${{ secrets.MAYO_AI_KEY }}
          MAYO_AI_MODEL: ${{ secrets.MAYO_AI_MODEL }}
        run: |
          # Use push branch or tag name as version
          VERSION=${GITHUB_REF##*/}
          echo "Generating changelog for version $VERSION..."
          
          # Run release-notes command and save to internal/changelog/data
          go run main.go release-notes "$VERSION" --quiet > "internal/changelog/data/$VERSION.md" || echo "Failed to generate changelog"

      - name: Commit and Push
        run: |
          git config --global user.name "Mayo AI"
          git config --global user.email "mayo-ai@teleskop.id"
          
          # Check if file was created and isn't empty
          if [ -s "internal/changelog/data/${GITHUB_REF##*/}.md" ]; then
            git add internal/changelog/data/
            git commit -m "chore: changelog update for ${GITHUB_REF##*/} [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No changelog generated or file is empty."
          fi
